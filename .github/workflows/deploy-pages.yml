name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: APP/speedpanel-estimator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: APP/speedpanel-estimator/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url || steps.deploy-retry1.outputs.page_url || steps.deploy-retry2.outputs.page_url }}
    steps:
      # actions/deploy-pages intermittently returns "Deployment failed, try again
      # later" from the Pages API even when the built artifact is fine. Retry a
      # couple of times after short pauses so transient hiccups self-heal without
      # a manual re-run. The final attempt has no continue-on-error, so a genuine
      # outage still fails the job.
      - name: Deploy to GitHub Pages
        id: deploy
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Pause before retry 1
        if: steps.deploy.outcome == 'failure'
        run: sleep 20
      - name: Deploy to GitHub Pages (retry 1)
        id: deploy-retry1
        if: steps.deploy.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Pause before retry 2
        if: steps.deploy.outcome == 'failure' && steps.deploy-retry1.outcome == 'failure'
        run: sleep 30
      - name: Deploy to GitHub Pages (retry 2)
        id: deploy-retry2
        if: steps.deploy.outcome == 'failure' && steps.deploy-retry1.outcome == 'failure'
        uses: actions/deploy-pages@v4
