<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speedpanel Estimator</title>
    <link rel="icon" type="image/png" href="%BASE_URL%favicon-32.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <meta name="theme-color" content="#0B1233" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Speedpanel" />
    <script>
      // Apply the "dark" class before first paint so a reload/deep-link doesn't
      // flash the light theme -- mirrors useThemeMode.ts's own preference/auto
      // logic exactly, since that hook can't run until after React mounts.
      (function () {
        try {
          var pref = window.localStorage.getItem("speedpanel:themePreference");
          var isDark = pref === "dark" || (pref !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (isDark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
